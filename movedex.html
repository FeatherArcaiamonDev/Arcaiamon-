<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcaiamon — Movedex</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --basic:#a8a878; --fire:#e8622c; --water:#3b8fd9; --volt:#f2c94c;
    --flora:#4caf50; --frost:#7fd8e8; --mystic:#9b5de5; --earth:#a5713c;
    --spirit:#6c6ca0; --holy:#f0d878; --iron:#8a8f98; --insect:#8bb03a; --wind:#7fd4b8;

    --bg:#12141c;
    --panel:#1a1d29;
    --panel-2:#20232f;
    --line:#2c3040;
    --text:#e8e9ef;
    --text-dim:#8a8fa3;
    --accent:#c9a86a;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(155,93,229,0.08), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(232,98,44,0.06), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding:32px 20px 80px;
  }

  header{
    max-width:1080px;
    margin:0 auto 28px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:1px solid var(--line);
    padding-bottom:20px;
  }
  h1{
    font-family:'Cinzel', serif;
    font-size:2rem;
    letter-spacing:0.03em;
    margin:0;
    color:var(--accent);
  }
  header p{
    margin:0;
    color:var(--text-dim);
    font-size:0.9rem;
  }

  .wrap{max-width:1080px; margin:0 auto;}

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:20px;
    margin-bottom:24px;
  }

  .panel h2{
    font-family:'Cinzel', serif;
    font-size:1.05rem;
    margin:0 0 16px;
    color:var(--text);
    letter-spacing:0.02em;
  }

  .form-grid{
    display:grid;
    grid-template-columns: 1.4fr 1fr 1fr 0.8fr 0.8fr 1.6fr auto;
    gap:10px;
    align-items:end;
  }

  .field label{
    display:block;
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-dim);
    margin-bottom:6px;
  }

  input, select{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:9px 10px;
    border-radius:6px;
    font-family:'Inter', sans-serif;
    font-size:0.88rem;
  }
  input:focus, select:focus{
    outline:none;
    border-color:var(--accent);
  }

  .add-btn{
    background:var(--accent);
    color:#1a1508;
    border:none;
    border-radius:6px;
    width:40px;
    height:40px;
    font-size:1.3rem;
    font-weight:600;
    cursor:pointer;
    line-height:1;
    transition:transform 0.12s ease, background 0.12s ease;
  }
  .add-btn:hover{ transform:scale(1.06); background:#dbb87d; }
  .add-btn:active{ transform:scale(0.96); }

  .table-wrap{ overflow-x:auto; }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:0.9rem;
  }

  thead th{
    text-align:left;
    padding:10px 12px;
    color:var(--text-dim);
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
  }
  thead th:hover{ color:var(--accent); }
  thead th.sorted{ color:var(--accent); }
  thead th .arrow{ font-size:0.7rem; margin-left:3px; opacity:0.7; }

  tbody tr{ border-bottom:1px solid var(--line); }
  tbody tr:hover{ background:rgba(255,255,255,0.02); }
  tbody td{ padding:11px 12px; vertical-align:top; }

  .type-badge{
    display:inline-block;
    padding:3px 10px;
    border-radius:20px;
    font-size:0.75rem;
    font-weight:600;
    color:#12141c;
    white-space:nowrap;
  }

  .cat-badge{
    font-size:0.75rem;
    color:var(--text-dim);
    border:1px solid var(--line);
    padding:2px 8px;
    border-radius:5px;
    white-space:nowrap;
  }

  .desc-cell{ color:var(--text-dim); font-size:0.85rem; max-width:280px; }
  .num-cell{ font-variant-numeric:tabular-nums; color:var(--text); }

  .del-btn{
    background:none;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:1rem;
    padding:2px 6px;
    border-radius:4px;
  }
  .del-btn:hover{ color:var(--fire); background:rgba(232,98,44,0.1); }

  .empty-state{
    text-align:center;
    padding:40px 20px;
    color:var(--text-dim);
    font-size:0.9rem;
  }

  .count-tag{
    color:var(--text-dim);
    font-size:0.8rem;
  }

  @media (max-width: 760px){
    .form-grid{ grid-template-columns: 1fr 1fr; }
    .add-btn{ grid-column: 1 / -1; width:100%; height:38px; }
  }
</style>
</head>
<body>

<header>
  <h1>Movedex</h1>
  <p>Arcaiamon move list &amp; sort tool</p>
</header>

<div class="wrap">

  <div class="panel">
    <h2>Add a move</h2>
    <div class="form-grid">
      <div class="field">
        <label for="f-name">Name</label>
        <input id="f-name" type="text" placeholder="e.g. Ember Lash">
      </div>
      <div class="field">
        <label for="f-type">Type</label>
        <select id="f-type"></select>
      </div>
      <div class="field">
        <label for="f-cat">Category</label>
        <select id="f-cat">
          <option value="Physical">Physical</option>
          <option value="Magic">Magic</option>
          <option value="Status">Status</option>
        </select>
      </div>
      <div class="field">
        <label for="f-power">Power</label>
        <input id="f-power" type="number" min="0" placeholder="0">
      </div>
      <div class="field">
        <label for="f-acc">Accuracy</label>
        <input id="f-acc" type="number" min="0" max="100" placeholder="100">
      </div>
      <div class="field">
        <label for="f-desc">Description / effect</label>
        <input id="f-desc" type="text" placeholder="What it does">
      </div>
      <button class="add-btn" id="add-btn" title="Add move">+</button>
    </div>
  </div>

  <div class="panel">
    <h2 style="display:flex; justify-content:space-between; align-items:center;">
      <span>Move list</span>
      <span class="count-tag" id="count-tag">0 moves</span>
    </h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-key="name">Name<span class="arrow"></span></th>
            <th data-key="type">Type<span class="arrow"></span></th>
            <th data-key="category">Category<span class="arrow"></span></th>
            <th data-key="power">Power<span class="arrow"></span></th>
            <th data-key="accuracy">Accuracy<span class="arrow"></span></th>
            <th data-key="none" style="cursor:default;">Description</th>
            <th data-key="none" style="cursor:default;"></th>
          </tr>
        </thead>
        <tbody id="move-body"></tbody>
      </table>
      <div class="empty-state" id="empty-state">No moves yet. Add your first one above.</div>
    </div>
  </div>

</div>

<script>
  const TYPES = ["Basic","Fire","Water","Volt","Flora","Frost","Mystic","Earth","Spirit","Holy","Iron","Insect","Wind"];

  const typeSelect = document.getElementById('f-type');
  TYPES.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    typeSelect.appendChild(opt);
  });

  let moves = [];
  let sortKey = null;
  let sortDir = 1;

  function typeColorVar(type){
    return `var(--${type.toLowerCase()})`;
  }

  function render(){
    const tbody = document.getElementById('move-body');
    const emptyState = document.getElementById('empty-state');
    const countTag = document.getElementById('count-tag');

    countTag.textContent = `${moves.length} move${moves.length === 1 ? '' : 's'}`;

    let list = [...moves];
    if(sortKey){
      list.sort((a,b) => {
        let av = a[sortKey], bv = b[sortKey];
        if(typeof av === 'string'){ av = av.toLowerCase(); bv = bv.toLowerCase(); }
        if(av < bv) return -1 * sortDir;
        if(av > bv) return 1 * sortDir;
        return 0;
      });
    }

    tbody.innerHTML = '';
    if(list.length === 0){
      emptyState.style.display = 'block';
    } else {
      emptyState.style.display = 'none';
      list.forEach(m => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(m.name)}</td>
          <td><span class="type-badge" style="background:${typeColorVar(m.type)}">${m.type}</span></td>
          <td><span class="cat-badge">${m.category}</span></td>
          <td class="num-cell">${m.power === '' ? '—' : m.power}</td>
          <td class="num-cell">${m.accuracy === '' ? '—' : m.accuracy + '%'}</td>
          <td class="desc-cell">${escapeHtml(m.desc) || '—'}</td>
          <td><button class="del-btn" data-id="${m.id}" title="Remove">✕</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sorted');
      const arrow = th.querySelector('.arrow');
      if(arrow) arrow.textContent = '';
      if(th.dataset.key === sortKey){
        th.classList.add('sorted');
        arrow.textContent = sortDir === 1 ? '▲' : '▼';
      }
    });

    tbody.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        moves = moves.filter(m => m.id !== btn.dataset.id);
        render();
      });
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    const name = document.getElementById('f-name').value.trim();
    const type = document.getElementById('f-type').value;
    const category = document.getElementById('f-cat').value;
    const power = document.getElementById('f-power').value;
    const accuracy = document.getElementById('f-acc').value;
    const desc = document.getElementById('f-desc').value.trim();

    if(!name){
      document.getElementById('f-name').focus();
      return;
    }

    moves.push({
      id: Date.now().toString() + Math.random().toString(36).slice(2,6),
      name, type, category,
      power: power === '' ? '' : Number(power),
      accuracy: accuracy === '' ? '' : Number(accuracy),
      desc
    });

    document.getElementById('f-name').value = '';
    document.getElementById('f-power').value = '';
    document.getElementById('f-acc').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-name').focus();

    render();
  });

  document.querySelectorAll('thead th').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if(key === 'none') return;
      if(sortKey === key){
        sortDir *= -1;
      } else {
        sortKey = key;
        sortDir = 1;
      }
      render();
    });
  });

  render();
</script>
</body>
</html>
